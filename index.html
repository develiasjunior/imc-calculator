<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>IMC-Calculator</title>
</head>
<body>
    <header>
        <h1>IMC-Calculator</h1>
        <p>Descubra seu Índice de Massa Corporal (IMC) rapidamente com nossa calculadora online. O IMC é uma ferramenta da OMS que avalia se seu peso está adequado para sua altura. Essencial para monitorar saúde, sobrepeso e obesidade, ajudando a guiar hábitos saudáveis.</p>
    </header>

    <main>
        <div class="weight">
            <label for="userWheight">Digite o seu peso:</label>
            <input type="number" class="userWheight" required placeholder="Peso (KG)">
        </div>

        <div class="height">
            <label for="userHeight">Digite a sua altura:</label>
            <input type="number" class="userHeight" required placeholder="Altura (cm)">
        </div>

        <button class="calculate">Calcular</button>

        <div class="result">
            <p class="resultImc"></p>
        </div>
    </main>
</body>
</html>
